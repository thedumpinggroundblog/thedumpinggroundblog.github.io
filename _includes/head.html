<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/default-style.css' | relative_url }}">
  {%- feed_meta -%}
  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}

  <style>
    :root {
      --theme-color: #007acc;
      --text-color: #f8f9fa;
      --background-color: #212529;
      --grey-color: #bbbbbb;
      --bingo-theme-color: #0D3B66;
      --marked-cell-color: #FCA08E;
      --button-color: #3376b6;
      --bingoed-cell-color: #F4D35E;
      --white: #f8f8ff;
      --link-button-color: #fefae0;
    }
    /* Can be referred to via var(--theme-color), etc */
  </style>

  <!-- For LaTeX (https://www.mathjax.org/#gettingstarted) -->
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  
  <!-- For plotting (https://plotly.com/javascript/getting-started/) -->
  <script src="https://cdn.plot.ly/plotly-3.0.0.min.js" charset="utf-8"></script>
</head>
